## Global configuration values shared across all Osmo services
##
global:
  ## Base location for Osmo Docker images in the registry
  ##
  osmoImageLocation: nvcr.io/nvidia/osmo

  ## Docker image tag for Osmo services
  ##
  osmoImageTag: latest

  ## Name of the Kubernetes secret containing Docker registry credentials
  ##
  imagePullSecret: null

  ## Node selector constraints for pod scheduling
  ##
  nodeSelector: {}
    # Add node selectors here as needed
    # kubernetes.io/arch: amd64
    # node-type: cpu
    # zone: us-west-2a

  ## Service account name for the OSMO services
  ##
  serviceAccountName: osmo

  ## Logging configuration for all Osmo services
  ##
  logs:
    ## Enable centralized logging collection and log volume mounting
    ##
    enabled: true

    ## Application log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
    ##
    logLevel: DEBUG

    ## Kubernetes system log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
    ##
    k8sLogLevel: WARNING

## Service account configuration for core Osmo services
##
serviceAccount:
  ## Create the chart-managed ServiceAccount. Set to false to re-use
  ## an existing ServiceAccount that already has workload identity bindings.
  ##
  create: true

  ## ServiceAccount name override. When empty, uses global.serviceAccountName.
  ##
  name: ""

  ## Extra ServiceAccount annotations such as
  ## `azure.workload.identity/client-id` for AKS workload identity.
  ##
  annotations: {}

## Configuration for individual Osmo services
##
services:
  ## Configuration file service settings
  ##
  configFile:
    ## Enable external configuration file loading
    ##
    enabled: false

    ## Path to the configuration file (used when enabled is true)
    ##
    path: /opt/osmo/config.yaml

  ## Database migration configuration (pgroll)
  ## When enabled, a Helm pre-upgrade hook Job runs migrations before pods are updated.
  ## Uses postgres:15-alpine with pgroll downloaded at runtime.
  ##
  migration:
    ## Enable the migration Job
    ##
    enabled: false

    ## Target pgroll schema version. Named after the app version: public_v{MAJOR}_{MINOR}_{PATCH}
    ##
    targetSchema: public

    ## Public image with bash, psql, and curl
    ##
    image: postgres:15-alpine

    ## pgroll release version to download
    ##
    pgrollVersion: v0.16.1

    ## Service account name (defaults to global if empty)
    ##
    serviceAccountName: ""

    ## Node selector, tolerations, and resources for the migration Job pod
    ##
    nodeSelector: {}
    tolerations: []
    resources: {}

    ## Annotations on the Job and ConfigMap resources.
    ## Use this to configure Helm hooks, ArgoCD hooks, or other orchestration.
    ## Example for ArgoCD PreSync:
    ##   extraAnnotations:
    ##     argocd.argoproj.io/hook: PreSync
    ##     argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    ##
    extraAnnotations: {}

    ## Extra configuration for extensibility
    ##
    extraPodAnnotations: {}
    extraEnv: []
    extraVolumeMounts: []
    extraVolumes: []
    initContainers: []

  ## PostgreSQL database service configuration
  ## Set enabled to false if using an external PostgreSQL deployment
  ##
  postgres:
    ## Enable PostgreSQL deployment on Kubernetes
    ## Set to false if using external PostgreSQL or managed service
    ##
    enabled: false

    ## PostgreSQL Docker image to use
    ##
    image: "postgres:15.1"

    ## Kubernetes image pull policy for PostgreSQL
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for PostgreSQL
    ##
    serviceName: postgres

    ## PostgreSQL service port
    ##
    port: 5432

    ## Database name to create and use
    ##
    db: osmo

    ## Enable NodePort service for external access
    ##
    enableNodePort: true

    ## NodePort number for external access (when enableNodePort is true)
    ##
    nodePort: 30033

    ## Persistent volume size for PostgreSQL data
    ##
    storageSize: 20Gi

    ## Storage class name for persistent volume
    ## Leave empty to use default storage class
    ##
    storageClassName: ""

    ## Node selector constraints for PostgreSQL pod scheduling
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: database

    ## Tolerations for PostgreSQL pod scheduling on tainted nodes
    ##
    tolerations: []
    # - key: "dedicated"
    #   operator: "Equal"
    #   value: "database"
    #   effect: "NoSchedule"

    ## PostgreSQL username
    ##
    user: postgres

    ## PostgreSQL password secret configuration
    ## Name of the Kubernetes secret containing the PostgreSQL password
    ##
    passwordSecretName: db-secret

    ## Key name in the secret that contains the PostgreSQL password
    ##
    passwordSecretKey: db-password

  ## Default admin user configuration
  ## When configured, the service will create an admin user on startup with the osmo-admin role
  ## and an access_token set to the specified password
  ##
  defaultAdmin:
    ## Enable default admin user creation
    ## When enabled, username and password must be configured
    ##
    enabled: false

    ## Username for the default admin user
    ##
    username: "admin"

    ## Name of the Kubernetes secret containing the default admin password
    ##
    passwordSecretName: default-admin-secret

    ## Key name in the secret that contains the default admin password
    ##
    passwordSecretKey: password

  ## Redis cache service configuration
  ## Set enabled to false if using an external Redis deployment
  ##
  redis:
    ## Enable Redis deployment on Kubernetes
    ## Set to false if using external Redis or managed service
    ##
    enabled: false

    ## Redis Docker image to use
    ##
    image: "redis:7.0"

    ## Kubernetes image pull policy for Redis
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for Redis
    ##
    serviceName: redis

    ## Redis service port
    ##
    port: 6379

    ## Redis database number to use (0-15)
    ##
    dbNumber: 0

    ## Enable NodePort service for external access
    ##
    enableNodePort: true

    ## NodePort number for external access (when enableNodePort is true)
    ##
    nodePort: 30034

    ## Persistent volume size for Redis data
    ##
    storageSize: 20Gi

    ## Storage class name for persistent volume
    ## Leave empty to use default storage class
    ##
    storageClassName: ""

    ## Node selector constraints for Redis pod scheduling
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: cache

    ## Tolerations for Redis pod scheduling on tainted nodes
    ##
    tolerations: []
    # - key: "dedicated"
    #   operator: "Equal"
    #   value: "cache"
    #   effect: "NoSchedule"

    ## Enable TLS encryption for Redis connections
    ##
    tlsEnabled: true

  ## Localstack S3 Object storage service configuration (local development + testing only)
  ## Set enabled to false if using an external Object storage deployment
  ##
  localstackS3:
    ## Enable Localstack S3 Object storage deployment on Kubernetes
    ## Set to false if using external Localstack S3 Object storage or managed service
    ##
    enabled: false

    ## Localstack S3 Object storage Docker image to use
    ##
    image: "gresau/localstack-persist:latest"

    ## Kubernetes image pull policy for Localstack S3 Object storage
    ##
    imagePullPolicy: Always

    ## Localstack S3 Object storage service name
    ##
    serviceName: localstack-s3

    ## Localstack S3 service port
    ##
    port: 4566

    ## Enable NodePort service for external access
    ##
    enableNodePort: true

    ## NodePort number for external access (when enableNodePort is true)
    ##
    nodePort: 30035

    ## Region for the Localstack S3 Object storage
    ##
    region: us-east-1

    ## Access key for the Localstack S3 Object storage
    ##
    accessKeyId: test

    ## Secret key for the Localstack S3 Object storage
    ##
    accessKey: test

    ## Buckets for the Localstack S3 Object storage
    ##
    buckets: []

    ## Image for the Localstack S3 Object storage bucket initialization
    ##
    bucketInitImage: amazon/aws-cli:2.15.33

    ## Persistent volume configuration for Localstack S3 Object storage
    ##
    persistence:
      enabled: true
      size: 5Gi
      storageClassName: standard

    ## Resource limits and requests for the Localstack S3 Object storage container
    ##
    resources: {}

  ## Delayed job monitor service configuration
  ##
  delayedJobMonitor:
    ## Number of delayed job monitor replicas to run
    ##
    replicas: 1

    ## Docker image name for the delayed job monitor service
    ##
    imageName: delayed-job-monitor

    ## Kubernetes image pull policy for the delayed job monitor service
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for the delayed job monitor service
    ##
    serviceName: osmo-delayed-job-monitor

    ## Init containers for delayed job monitor
    ##
    initContainers: []

    ## Node selector constraints for delayed job monitor pod scheduling
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: cpu

    ## Volumes for delayed job monitor
    ## Default includes progress files for liveness and startup probes
    ##
    volumes:
      - name: progress-files
        emptyDir: {}

    ## Volume mounts for delayed job monitor
    ## Default includes progress files for liveness and startup probes
    ##
    volumeMounts:
      - name: progress-files
        mountPath: /var/run/osmo

    ## Resource limits and requests for the delayed job monitor container
    ##
    resources: {}
    # limits:
    #   cpu: 200m
    #   memory: 256Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

    ## Tolerations for delayed job monitor pod scheduling on tainted nodes
    ##
    tolerations: []
    # - key: "node-type"
    #   operator: "Equal"
    #   value: "cpu"
    #   effect: "NoSchedule"

    ## Extra pod annotations for the delayed job monitor service
    ##
    extraPodAnnotations: {}

    ## Extra pod labels for the delayed job monitor service pods.
    ## Use for workload identity labels like `azure.workload.identity/use`.
    ##
    extraPodLabels: {}

    ## Extra environment variables for the delayed job monitor service container
    ##
    extraEnv: []

    ## Extra command line arguments for the delayed job monitor service
    ##
    extraArgs: []

    ## Extra volume mounts for the delayed job monitor service container
    ##
    extraVolumeMounts: []

    ## Extra volumes for the delayed job monitor service pod
    ##
    extraVolumes: []

    ## Extra sidecar containers for the delayed job monitor service pod
    ##
    extraSidecars: []

    ## Service account name for the delayed job monitor service
    ##
    serviceAccountName: ""

  ## Worker service configuration for background job processing
  ##
  worker:
    ## Horizontal Pod Autoscaler (HPA) configuration for workers
    ##
    scaling:
      ## Minimum number of worker replicas
      ##
      minReplicas: 2

      ## Maximum number of worker replicas when scaling
      ##
      maxReplicas: 10

      ## Target Memory utilization percentage for HPA scaling
      ##
      hpaMemoryTarget: 80
      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

      ## Additional custom metrics for HPA scaling (list of autoscaling/v2 metric specs)
      ##
      customMetrics: []

    ## Docker image name for the worker service
    ##
    imageName: worker

    ## Kubernetes image pull policy for the worker service
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for the worker service
    ##
    serviceName: osmo-worker

    ## Init containers for worker
    ##
    initContainers: []

    ## Node selector constraints for worker pod scheduling
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: cpu


    ## Topology spread constraints to distribute worker pods across nodes/zones
    ##
    topologySpreadConstraints:
    ## Spread worker pods across different hostnames (nodes)
    ##
    - topologyKey: kubernetes.io/hostname
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway
    ## Spread worker pods across different availability zones
    ##
    - topologyKey: topology.kubernetes.io/zone
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway

    ## Resource limits and requests for the worker container
    ##
    resources: {}
    # limits:
    #   cpu: 1000m
    #   memory: 1Gi
    # requests:
    #   cpu: 500m
    #   memory: 512Mi

    ## Tolerations for worker pod scheduling on tainted nodes
    ##
    tolerations: []
    # - key: "node-type"
    #   operator: "Equal"
    #   value: "cpu"
    #   effect: "NoSchedule"

    ## Extra pod annotations for the worker service
    ##
    extraPodAnnotations: {}

    ## Extra pod labels for the worker service pods.
    ## Use for workload identity labels like `azure.workload.identity/use`.
    ##
    extraPodLabels: {}

    ## Extra environment variables for the worker service container
    ##
    extraEnv: []

    ## Additional command line arguments to pass to the worker service
    ##
    extraArgs: []
    # - "--concurrency=10"
    # - "--max-memory=1Gi"

    ## Extra volume mounts for the worker service container
    ##
    extraVolumeMounts: []

    ## Extra volumes for the worker service pod
    ##
    extraVolumes: []

    ## Extra sidecar containers for the worker service pod
    ##
    extraSidecars: []

    ## Service account name for the worker service
    ##
    serviceAccountName: ""

  ## Main API service configuration
  ##
  service:
    ## Horizontal Pod Autoscaler (HPA) configuration for the API service
    ##
    scaling:
      ## Minimum number of API service replicas
      ##
      minReplicas: 3

      ## Maximum number of API service replicas when scaling
      ##
      maxReplicas: 9

      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaMemoryTarget: 80
      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

      ## Additional custom metrics for HPA scaling (list of autoscaling/v2 metric specs)
      ##
      customMetrics: []

    ## Docker image name for the API service
    ##
    imageName: service

    ## Kubernetes image pull policy for the API service
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for the API service
    ##
    serviceName: osmo-service

    ## Init containers for API service
    ##
    initContainers: []

    ## Hostname on which the ingress is served
    ## Leave empty to use the default cluster hostname
    ##
    hostname: ""

    ## Host aliases for custom DNS resolution within the API service pods
    ##
    hostAliases: []
    # - ip: "192.168.1.100"
    #   hostnames:
    #   - "example.local"

    ## URL for the client install script shown in version update messages
    ##
    clientInstallUrl: "https://raw.githubusercontent.com/NVIDIA/OSMO/refs/heads/main/install.sh"

    ## Disable task metrics collection (set to true to disable)
    ##
    disableTaskMetrics: false

    ## Enable authentication for the API service
    ## An example when using Keycloak is:
    ##
    ## auth:
    ##   enabled: true
    ##   device_endpoint: https://auth-name.osmo.nvidia.com/realms/osmo/protocol/openid-connect/auth
    ##   device_client_id: osmo-device
    ##   browser_endpoint: https://auth-name.osmo.nvidia.com/realms/osmo/protocol/openid-connect/auth
    ##   browser_client_id: osmo-browser-flow
    ##   token_endpoint: https://auth-name.osmo.nvidia.com/realms/osmo/protocol/openid-connect/token
    ##   logout_endpoint: https://auth-name.osmo.nvidia.com/realms/osmo/protocol/openid-connect/logout
    ##
    ## An example when using Microsoft Azure AD is:
    ##
    ## auth:
    ##   enabled: true
    ##   device_endpoint: https://login.microsoftonline.com/<id>/oauth2/v2.0/devicecode
    ##   device_client_id: <client-id>
    ##   browser_endpoint: https://login.microsoftonline.com/<id>/oauth2/v2.0/authorize
    ##   browser_client_id: <client-id>
    ##   token_endpoint: https://login.microsoftonline.com/<id>/oauth2/v2.0/token
    ##   logout_endpoint: https://login.microsoftonline.com/<id>/oauth2/v2.0/logout
    ##
    auth:
      enabled: false

      ## URL for the device endpoint
      ##
      device_endpoint: ""

      ## Client ID for the device endpoint
      ##
      device_client_id: ""

      ## URL for the browser endpoint
      ##
      browser_endpoint: ""

      ## Client ID for the browser endpoint
      ##
      browser_client_id: ""

      ## URL for the token endpoint
      ##
      token_endpoint: ""

      ## URL for the logout endpoint
      ##
      logout_endpoint: ""

    ## Liveness probe configuration for the API service
    ##
    livenessProbe:
      ## HTTP GET probe configuration
      ##
      httpGet:
        port: 8000
        path: /api/version
      ## Timeout for the probe
      ##
      timeoutSeconds: 20
      ## Number of failures before marking as unhealthy
      ##
      failureThreshold: 3
      ## How often to perform the probe
      ##
      periodSeconds: 45

    ## Node selector constraints for API service pod scheduling
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: cpu

    ## Topology spread constraints to distribute API service pods across zones
    ##
    topologySpreadConstraints:
    ## Spread API service pods across different availability zones
    ##
    - topologyKey: topology.kubernetes.io/zone
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway

    ## Resource limits and requests for the API service container
    ##
    resources: {}
    # limits:
    #   cpu: 2000m
    #   memory: 2Gi
    # requests:
    #   cpu: 1000m
    #   memory: 1Gi

    ## Tolerations for API service pod scheduling on tainted nodes
    ##
    tolerations: []
    # - key: "node-type"
    #   operator: "Equal"
    #   value: "cpu"
    #   effect: "NoSchedule"

    ## Extra pod annotations for the API service
    ##
    extraPodAnnotations: {}

    ## Extra pod labels for the API service pods.
    ## Use for workload identity labels like `azure.workload.identity/use`.
    ##
    extraPodLabels: {}

    ## Extra environment variables for the API service container
    ##
    extraEnv: []

    ## Additional command line arguments to pass to the API service
    ##
    extraArgs: []
    # - "--debug"
    # - "--max-connections=1000"

    ## Extra volume mounts for the API service container
    ##
    extraVolumeMounts: []

    ## Extra volumes for the API service pod
    ##
    extraVolumes: []

    ## Extra sidecar containers for the API service pod
    ##
    extraSidecars: []

    ## Service account name for the API service
    ##
    serviceAccountName: ""


  ## Logger service configuration for log collection and processing
  ##
  logger:
    ## Horizontal Pod Autoscaler (HPA) configuration for the logger service
    ##
    scaling:
      ## Minimum number of logger service replicas
      ##
      minReplicas: 3

      ## Maximum number of logger service replicas when scaling
      ##
      maxReplicas: 9

      ## Target Memory utilization percentage for HPA scaling
      ##
      hpaMemoryTarget: 80
      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

      ## Additional custom metrics for HPA scaling (list of autoscaling/v2 metric specs)
      ##
      customMetrics: []

    ## Docker image name for the logger service
    ##
    imageName: logger

    ## Kubernetes image pull policy for the logger service
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for the logger service
    ##
    serviceName: osmo-logger

    ## Init containers for logger service
    ##
    initContainers: []

    ## Node selector constraints for logger service pod scheduling
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: cpu

    ## Topology spread constraints to distribute logger service pods across zones
    ##
    topologySpreadConstraints:
    ## Spread logger service pods across different availability zones
    ##
    - topologyKey: topology.kubernetes.io/zone
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway

    ## Resource limits and requests for the logger service container
    ##
    resources:
      ## Resource requests (guaranteed allocation)
      ##
      requests:
        cpu: "1"
        memory: "1Gi"
      ## Resource limits (maximum allocation)
      ##
      limits:
        memory: "1Gi"

    ## Tolerations for logger service pod scheduling on tainted nodes
    ##
    tolerations: []
    # - key: "node-type"
    #   operator: "Equal"
    #   value: "cpu"
    #   effect: "NoSchedule"

    ## Extra pod annotations for the logger service
    ##
    extraPodAnnotations: {}

    ## Extra pod labels for the logger service pods.
    ## Use for workload identity labels like `azure.workload.identity/use`.
    ##
    extraPodLabels: {}

    ## Extra environment variables for the logger service container
    ##
    extraEnv: []

    ## Extra command line arguments for the logger service
    ##
    extraArgs: []

    ## Extra volume mounts for the logger service container
    ##
    extraVolumeMounts: []

    ## Extra volumes for the logger service pod
    ##
    extraVolumes: []

    ## Extra sidecar containers for the logger service pod
    ##
    extraSidecars: []

    ## Service account name for the logger service
    ##
    serviceAccountName: ""

    ## Per-service Envoy proxy configuration overrides
    ## These settings override the global sidecars.envoy configuration for this service only
    ## Any field from sidecars.envoy can be specified here to override the global default
    ##
    envoy: {}
    # maxRequests: 50
    # routes: [...]

  ## Agent service configuration for client communication and management
  ##
  agent:
    ## Horizontal Pod Autoscaler (HPA) configuration for the agent service
    ##
    scaling:
      ## Minimum number of agent service replicas
      ##
      minReplicas: 1

      ## Maximum number of agent service replicas when scaling
      ##
      maxReplicas: 9

      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaMemoryTarget: 80
      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

      ## Additional custom metrics for HPA scaling (list of autoscaling/v2 metric specs)
      ##
      customMetrics: []

    ## Docker image name for the agent service
    ##
    imageName: agent

    ## Kubernetes image pull policy for the agent service
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for the agent service
    ##
    serviceName: osmo-agent

    ## Init containers for agent service
    ##
    initContainers: []

    ## Node selector constraints for agent service pod scheduling
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: cpu

    ## Topology spread constraints to distribute agent service pods across zones
    ##
    topologySpreadConstraints:
    ## Spread agent service pods across different availability zones
    ##
    - topologyKey: topology.kubernetes.io/zone
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway

    ## Resource limits and requests for the agent service container
    ##
    resources:
      ## Resource requests (guaranteed allocation)
      ##
      requests:
        cpu: "500m"
        memory: "500Mi"
      ## Resource limits (maximum allocation)
      ##
      limits:
        memory: "500Mi"

    ## Tolerations for agent service pod scheduling on tainted nodes
    ##
    tolerations: []
    # - key: "node-type"
    #   operator: "Equal"
    #   value: "cpu"
    #   effect: "NoSchedule"

    ## Extra pod annotations for the agent service
    ##
    extraPodAnnotations: {}

    ## Extra pod labels for the agent service pods.
    ## Use for workload identity labels like `azure.workload.identity/use`.
    ##
    extraPodLabels: {}

    ## Extra environment variables for the agent service container
    ##
    extraEnv: []

    ## Extra command line arguments for the agent service
    ##
    extraArgs: []

    ## Extra volume mounts for the agent service container
    ##
    extraVolumeMounts: []

    ## Extra volumes for the agent service pod
    ##
    extraVolumes: []

    ## Extra sidecar containers for the agent service pod
    ##
    extraSidecars: []

    ## Service account name for the agent service
    ##
    serviceAccountName: ""

    ## Per-service Envoy proxy configuration overrides
    ## These settings override the global sidecars.envoy configuration for this service only
    ## Any field from sidecars.envoy can be specified here to override the global default
    ##
    envoy: {}
    # maxRequests: 100
    # routes: [...]

## PodMonitor configuration (requires Prometheus Operator / monitoring.coreos.com CRD)
## Set enabled: false if the PodMonitor CRD is not installed in your cluster.
##
podMonitor:
  enabled: true

## Global configuration for extra ConfigMaps
## These ConfigMaps can be used for custom configurations
##
extraConfigMaps: []
# - name: custom-config
#   data:
#     config.yaml: |
#       key: value

## ============================================================================
## Gateway — standalone Envoy + OAuth2 Proxy + Authz as separate Deployments.
##
## When gateway.enabled is true, the chart deploys an independent Envoy proxy
## tier that routes traffic to all upstream services (osmo-service, osmo-router,
## osmo-ui). Authentication (OAuth2), authorization (Authz), and rate limiting
## are handled at the gateway level rather than per-service.
##
## Envoy uses filesystem-based dynamic configuration (LDS/CDS) so that
## listener and cluster changes are picked up automatically when the ConfigMap
## is updated — no pod restart required.
## ============================================================================
gateway:
  ## Name prefix for all gateway K8s resources (e.g. osmo-gateway-envoy)
  ##
  name: osmo-gateway

  ## -----------------------------------------------------------------------
  ## Gateway Envoy Proxy
  ## -----------------------------------------------------------------------
  envoy:
    ## Enable Envoy deployment
    ##
    enabled: true

    ## Horizontal Pod Autoscaler (HPA) configuration for Envoy
    ##
    scaling:
      ## Minimum number of Envoy replicas
      ##
      minReplicas: 2

      ## Maximum number of Envoy replicas when scaling
      ##
      maxReplicas: 6

      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

      ## Target memory utilization percentage for HPA scaling
      ##
      hpaMemoryTarget: 80

      ## Additional custom metrics for HPA scaling (list of autoscaling/v2 metric specs)
      ##
      customMetrics: []

    ## Envoy container image
    ##
    image: "envoyproxy/envoy:v1.29.0"

    ## Image pull policy for Envoy containers
    ##
    imagePullPolicy: IfNotPresent

    ## Envoy log level
    ##
    logLevel: info

    ## Listener port for incoming traffic
    ##
    listenerPort: 8080

    ## Maximum size of all HTTP headers in KB
    ##
    maxHeadersSizeKb: 128

    ## List of IP addresses to block at the gateway
    ##
    blockedIPs: []

    ## External hostname (used for OAuth2 redirect URL)
    ##
    hostname: ""

    ## Service account name for the Envoy pods
    ##
    serviceAccountName: ""

    ## Kubernetes Service configuration for the gateway.
    ##
    ## Two modes for external access:
    ##   NLB (default): type=LoadBalancer — each deployment gets its own NLB
    ##   ALB (shared):  type=ClusterIP + ingress.enabled=true — multiple
    ##                  namespaces share a single ALB via group.name
    ##
    service:
      ## Service type:
      ##   LoadBalancer — direct NLB access (default, one LB per deployment)
      ##   ClusterIP    — use with gateway.envoy.ingress for shared ALB
      ##   NodePort     — use with KIND port mapping for local development
      ##
      type: LoadBalancer

      ## HTTPS port for NLB TLS termination.
      ## The NLB terminates TLS on this port and forwards plaintext to Envoy.
      ## Set to null to expose only port 80 (e.g. for local development).
      ##
      httpsPort: 443

      ## Fixed NodePort for the HTTP port (only used when type=NodePort).
      ## KIND maps this to a host port for local access.
      ##
      nodePort: null

      ## Annotations for the Service (e.g. AWS NLB annotations)
      ##
      annotations: {}

    ## Ingress configuration for shared ALB mode.
    ## Enable this and set service.type=ClusterIP when multiple namespaces
    ## need to share a single load balancer (e.g. ALB with group.name).
    ##
    ingress:
      ## Enable ALB Ingress (set service.type to ClusterIP when using this)
      ##
      enabled: false

      ## Ingress controller class
      ##
      ingressClass: alb

      ## AWS ALB-specific annotations
      ##
      albAnnotations:
        enabled: false
        groupName: osmo
        groupOrder: "10"
        sslCertArn: ""

      ## Enable TLS on the Ingress
      ##
      sslEnabled: false

      ## Secret name for TLS certificates
      ##
      sslSecret: osmo-tls

      ## Additional annotations
      ##
      annotations: {}

    ## SSL/TLS configuration for the Envoy listener (downstream).
    ## The Secret must contain tls.crt and tls.key entries (kubernetes.io/tls type).
    ## Mounted as a directory (not subPath) so Kubernetes symlink rotation
    ## propagates cert renewals without a pod restart.
    ##
    ssl:
      enabled: false
      secretName: envoy-ssl-cert

    ## Security context for Envoy containers
    ##
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 1001

    ## Resource limits and requests for Envoy containers
    ##
    resources:
      requests:
        cpu: "200m"
        memory: "128Mi"
      limits:
        memory: "256Mi"

    ## Health probes for Envoy containers
    ##
    livenessProbe:
      httpGet:
        path: /ready
        port: 9901
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
    readinessProbe:
      httpGet:
        path: /ready
        port: 9901
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
    startupProbe:
      httpGet:
        path: /ready
        port: 9901
      initialDelaySeconds: 15
      periodSeconds: 5
      timeoutSeconds: 3

    ## Node selector for Envoy pods
    ##
    nodeSelector: {}

    ## Tolerations for Envoy pods
    ##
    tolerations: []

    ## Identity Provider for JWKS discovery (e.g. login.microsoftonline.com)
    ##
    idp:
      host: ""

    ## Internal JWKS cluster — used for the "osmo" JWT issuer.
    ## Points to the osmo-service K8s Service so Envoy can fetch the JWKS.
    ##
    internalJwks:
      enabled: true
      cluster: osmo-service-jwks
      host: ""
      port: ""

    ## JWT authentication configuration
    ##
    jwt:
      user_header: x-osmo-user
      providers: []

    ## Paths that bypass authentication (served without OAuth2 or JWT checks)
    ##
    skipAuthPaths:
    - /api/version
    - /api/auth/login
    - /api/auth/keys
    - /api/auth/refresh_token
    - /api/auth/jwt/refresh_token
    - /api/auth/jwt/access_token
    - /api/router/version
    - /client/version

    ## Route configuration for the osmo-router upstream.
    ## Uses RING_HASH lb_policy with a cookie for session affinity.
    ##
    routerRoute:
      prefix: /api/router
      timeout: 0s
      cookie:
        name: _osmo_router_affinity
        ttl: 60s

    ## Advanced service routes for the osmo-service upstream.
    ## Each entry is a standard Envoy route YAML block (match + route).
    ## When empty, default routes for /api/ and /client/ are used.
    ##
    serviceRoutes: []

    ## Circuit breaker — max concurrent requests to the osmo-service upstream
    ##
    maxRequests: 100

  ## -----------------------------------------------------------------------
  ## Upstream services — K8s Service DNS names that the gateway routes to.
  ## Override with FQDN (e.g. osmo-service.ns.svc.cluster.local) when the
  ## gateway is in a different namespace than the upstream services.
  ## -----------------------------------------------------------------------
  upstreams:
    service:
      enabled: true
      host: osmo-service
      port: 80
    router:
      enabled: true
      host: osmo-router-headless
      ## Port 8000 (not 80) because the headless service resolves to pod IPs
      ## directly, and Envoy connects to the pod port, not the Service port.
      port: 8000
    ui:
      enabled: true
      host: osmo-ui
      port: 80
    agent:
      enabled: true
      host: osmo-agent
      port: 80
    logger:
      enabled: true
      host: osmo-logger
      port: 80

  ## -----------------------------------------------------------------------
  ## Gateway OAuth2 Proxy — handles OIDC authentication flows.
  ## Deployed as its own pod so it can be scaled and updated independently.
  ## -----------------------------------------------------------------------
  oauth2Proxy:
    enabled: true

    ## Horizontal Pod Autoscaler (HPA) configuration for OAuth2 Proxy
    ##
    scaling:
      ## Minimum number of OAuth2 Proxy replicas
      ##
      minReplicas: 1

      ## Maximum number of OAuth2 Proxy replicas when scaling
      ##
      maxReplicas: 3

      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

      ## Target memory utilization percentage for HPA scaling
      ##
      hpaMemoryTarget: 80

      ## Additional custom metrics for HPA scaling (list of autoscaling/v2 metric specs)
      ##
      customMetrics: []

    image: "quay.io/oauth2-proxy/oauth2-proxy:v7.14.2"
    imagePullPolicy: IfNotPresent
    httpPort: 4180
    metricsPort: 44180
    provider: oidc
    oidcIssuerUrl: ""
    clientId: ""
    cookieName: _osmo_session
    cookieSecure: true
    cookieDomain: ""
    cookieExpire: 168h
    cookieRefresh: 1h
    scope: "openid email profile"
    passAccessToken: false
    redisSessionStore: true
    useKubernetesSecrets: false
    secretName: oauth2-proxy-secrets
    clientSecretKey: client_secret
    cookieSecretKey: cookie_secret
    secretPaths:
      clientSecret: /etc/oauth2-proxy/client-secret
      cookieSecret: /etc/oauth2-proxy/cookie-secret
    extraArgs: []
    redis:
      serviceName: ""
      port: 6379
      tlsEnabled: true
      dbNumber: 0
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 1001
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        memory: "128Mi"
    nodeSelector: {}
    tolerations: []
    extraPodAnnotations: {}
    extraVolumeMounts: []
    extraVolumes: []
    serviceAccountName: ""

  ## -----------------------------------------------------------------------
  ## Gateway Authz — gRPC authorization service evaluating semantic RBAC
  ## policies against PostgreSQL. Uses the shared services.postgres config.
  ## -----------------------------------------------------------------------
  authz:
    enabled: true

    ## Horizontal Pod Autoscaler (HPA) configuration for Authz
    ##
    scaling:
      ## Minimum number of Authz replicas
      ##
      minReplicas: 1

      ## Maximum number of Authz replicas when scaling
      ##
      maxReplicas: 3

      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

      ## Target memory utilization percentage for HPA scaling
      ##
      hpaMemoryTarget: 80

      ## Additional custom metrics for HPA scaling (list of autoscaling/v2 metric specs)
      ##
      customMetrics: []

    imageName: "authz-sidecar"
    ## Override the image tag for authz. Defaults to global.osmoImageTag.
    imageTag: ""
    imagePullPolicy: Always
    grpcPort: 50052
    extraEnv: []
    postgres:
      sslMode: prefer
      maxConns: 10
      minConns: 2
      maxConnLifetimeMin: 5
    cache:
      ttl: 300
      maxSize: 1000
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 10001
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    livenessProbe:
      grpc:
        port: 50052
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    readinessProbe:
      grpc:
        port: 50052
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 2
    nodeSelector: {}
    tolerations: []
    extraPodAnnotations: {}
    extraVolumeMounts: []
    extraVolumes: []
    serviceAccountName: ""

  ## -----------------------------------------------------------------------
  ## Gateway Rate Limiting — Redis-backed rate limiting via Envoy's
  ## ratelimit filter. Deploys a standalone ratelimit service pod.
  ## -----------------------------------------------------------------------
  rateLimit:
    enabled: false
    replicas: 1
    image: envoyproxy/ratelimit:9d8d70a8
    imagePullPolicy: IfNotPresent
    grpcPort: 8091
    httpPort: 8090

    redis:
      serviceName: ""
      port: 6379
      tlsEnabled: true

    config:
      domain: ratelimit
      descriptors: []

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 1001
    resources:
      requests:
        cpu: "0.1"
        memory: "200Mi"
      limits:
        memory: "200Mi"
    nodeSelector: {}
    tolerations: []

  ## -----------------------------------------------------------------------
  ## Network Policies — restrict ingress to upstream service pods so that
  ## only the gateway Envoy pods can reach them. Requires a CNI that
  ## enforces NetworkPolicy (e.g. Calico, Cilium, or AWS VPC CNI with
  ## enable-network-policy-controller=true).
  ## -----------------------------------------------------------------------
  networkPolicies:
    enabled: false
    upstreams:
    - name: osmo-service
      podSelector:
        app: osmo-service
      port: 8000
    - name: osmo-router
      podSelector:
        app: osmo-router
      port: 8000
    - name: osmo-ui
      podSelector:
        app: osmo-ui
      port: 8000

  ## -----------------------------------------------------------------------
  ## TLS — self-signed certificates for encrypted gateway-to-upstream
  ## communication. When enabled, Helm generates a CA and server cert;
  ## Envoy uses the CA to verify upstream connections. The upstream
  ## services must also be configured to serve HTTPS.
  ## -----------------------------------------------------------------------
  tls:
    enabled: false
