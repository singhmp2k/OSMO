{{/* Create a copy of the shared sidecar config values */}}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.logger.serviceName }}
  labels:
    app: {{ .Values.services.logger.serviceName }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.services.logger.serviceName }}
  template:
    metadata:
      labels:
        app: {{ .Values.services.logger.serviceName }}
        {{- with .Values.services.logger.extraPodLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "osmo.extra-annotations" .Values.services.logger | nindent 8 }}
    spec:
      {{- with .Values.services.logger.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      topologySpreadConstraints:
      {{- range .Values.services.logger.topologySpreadConstraints }}
      - topologyKey: {{.topologyKey }}
        {{- range $key, $value := . }}
        {{- if ne $key "topologyKey" }}
        {{$key}}: {{$value}}
        {{- end }}
        {{- end }}
        labelSelector:
          matchLabels:
            app: {{ $.Values.services.logger.serviceName }}
      {{- end }}
      nodeSelector:
        {{- range $k, $v := .Values.global.nodeSelector}}
        {{ $k }}: {{ $v }}
        {{- end}}
        {{- range $k, $v := .Values.services.logger.nodeSelector}}
        {{ $k }}: {{ $v }}
        {{- end}}
      tolerations:
      {{ toYaml .Values.services.logger.tolerations | nindent 8 }}
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
      - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      serviceAccountName: {{ include "osmo.service-account-name" (dict "serviceAccountName" .Values.services.logger.serviceAccountName "Values" .Values) }}
      {{- with .Values.services.logger.initContainers }}
      initContainers:
      {{- toYaml . | nindent 6 }}
      {{- end }}
      containers:
      - name: {{ .Values.services.logger.serviceName }}
        image: {{ .Values.global.osmoImageLocation }}/{{ .Values.services.logger.imageName }}:{{ .Values.global.osmoImageTag }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1001
        ports:
        - name: metrics
          containerPort: 9464
        command:
        - logger
        args:
        - --redis_host
        - {{ .Values.services.redis.serviceName }}
        - --redis_port
        - {{ .Values.services.redis.port | quote }}
        {{- if .Values.services.redis.tlsEnabled }}
        - --redis_tls_enable
        - "true"
        - --redis_db_number
        - {{ .Values.services.redis.dbNumber | quote }}
        {{- end}}
        - --postgres_host
        - {{ .Values.services.postgres.serviceName }}
        - --postgres_port
        - {{ .Values.services.postgres.port | quote }}
        - --postgres_database_name
        - {{ .Values.services.postgres.db}}
        {{- if .Values.services.configFile.enabled }}
        - --mek_file
        - {{ .Values.services.configFile.path }}
        {{- end}}
        {{- if .Values.services.postgres.user }}
        - --postgres_user
        - {{ .Values.services.postgres.user }}
        {{- end }}
        {{- if .Values.global.logs.enabled }}
        - --log_level
        - {{ .Values.global.logs.logLevel }}
        - --k8s_log_level
        - {{ .Values.global.logs.k8sLogLevel }}
        - --log_dir
        - /logs
        - --log_name
        - logger_service
        {{- end }}
        {{- range $arg := .Values.services.logger.extraArgs }}
        - {{ $arg | quote }}
        {{- end }}
        env:
        {{- include "osmo.extra-env" .Values.services.logger | nindent 8 }}
        {{- if .Values.services.postgres.password }}
        - name: OSMO_POSTGRES_PASSWORD
          value: {{ .Values.services.postgres.password }}
        {{- else if .Values.services.configFile.enabled }}
        - name: OSMO_POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: db-password
        - name: OSMO_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: redis-password
        {{- end }}
        imagePullPolicy: {{ .Values.services.logger.imagePullPolicy }}
        ports:
        {{- if or .Values.services.configFile.enabled .Values.global.logs.enabled .Values.services.logger.extraVolumeMounts }}
        volumeMounts:
        {{- end }}
        {{- if .Values.services.configFile.enabled}}
        - mountPath: {{ .Values.services.configFile.path }}
          name: mek-volume
          subPath: mek.yaml
        {{- end }}
        {{- if .Values.global.logs.enabled }}
        - name: logs
          mountPath: /logs
        {{- end }}
        {{- include "osmo.extra-volume-mounts" .Values.services.logger | nindent 8 }}
        resources:
        {{- toYaml .Values.services.logger.resources | nindent 10 }}

        # Any failure to return the version api means the service is in a bad state
        livenessProbe:
          exec:
            command:
            - progress_check
            - --progress_interval
            - "300"
            - --progress_file
            - /var/run/osmo/last_progress
          timeoutSeconds: 20
          failureThreshold: 3
          periodSeconds: 45

        # Give the container 30 seconds to startup
        startupProbe:
          exec:
            command:
            - progress_check
            - --progress_interval
            - "60"
            - --progress_file
            - /var/run/osmo/last_progress
          failureThreshold: 12
          periodSeconds: 5
          timeoutSeconds: 15
          initialDelaySeconds: 10

        readinessProbe:
          httpGet:
            port: 8000
            path: /health
          periodSeconds: 45
          failureThreshold: 3
          timeoutSeconds: 20


      {{- include "osmo.extra-sidecars" .Values.services.logger | nindent 6 }}
      volumes:
        {{- include "osmo.extra-volumes" .Values.services.logger | nindent 8 }}
        {{- if .Values.global.logs.enabled }}
        - name: logs
          emptyDir: {}
        {{- end}}
        {{- if .Values.services.configFile.enabled}}
        - configMap:
            defaultMode: 420
            items:
            - key: mek.yaml
              path: mek.yaml
            name: mek-config
          name: mek-volume
        {{- end}}

---

apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.logger.serviceName }}
  labels:
    app: {{ .Values.services.logger.serviceName }}
spec:
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: {{ .Values.services.logger.serviceName }}

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.services.logger.serviceName }}
  labels:
    app: {{ .Values.services.logger.serviceName }}
  annotations:
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.services.logger.serviceName }}
  minReplicas: {{ .Values.services.logger.scaling.minReplicas }}
  maxReplicas: {{ .Values.services.logger.scaling.maxReplicas }}
  metrics:
  - type: ContainerResource
    containerResource:
      name: memory
      container: {{ .Values.services.logger.serviceName }}
      target:
        type: Utilization
        averageUtilization: {{ .Values.services.logger.scaling.hpaMemoryTarget }}
  - type: ContainerResource
    containerResource:
      name: cpu
      container: {{ .Values.services.logger.serviceName }}
      target:
        type: Utilization
        averageUtilization: {{ .Values.services.logger.scaling.hpaCpuTarget }}
  {{- with .Values.services.logger.scaling.customMetrics }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
