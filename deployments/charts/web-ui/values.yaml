## Global configuration values shared across all Osmo services
##
global:
  ## Base location for Osmo Docker images in the registry
  ##
  osmoImageLocation: nvcr.io/nvidia/osmo


  ## Docker image tag for Osmo server components
  ##
  osmoImageTag: latest

  ## Name of the Kubernetes secret containing Docker registry credentials
  ##
  imagePullSecret: null

  ## Node selector constraints for pod scheduling
  ##
  nodeSelector: {}
    # Add node selectors here as needed
    # kubernetes.io/arch: amd64
    # node-type: cpu
    # zone: us-west-2a

  ## Logging configuration for all Osmo services
  ##
  logs:
    ## Enable centralized logging collection and log volume mounting
    ##
    enabled: true



## Configuration for individual Osmo services
##
services:
  ## UI service configuration
  ##
  ui:
    ## Number of UI service replicas to run
    ##
    replicas: 1

    ## Docker image name for the UI service (without registry or tag)
    ##
    imageName: web-ui

    ## Kubernetes image pull policy for the UI service
    ## Options: Always, IfNotPresent, Never
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for the UI service
    ##
    serviceName: osmo-ui

    ## Hostname on which the ingress is served
    ##
    hostname: ""

    ## Hostname on which the osmo API server is hosted
    ## Default is the local cluster hostname
    ## Can be overridden to serve the API from public domain
    ## e.g. "osmo.your-domain.com"
    ##
    apiHostname: "osmo-service.osmo.svc.cluster.local:80"

    ## Enable port-forwarding through Web UI
    ##
    portForwardEnabled: false

    ## Enable SSL/TLS encryption for nextjs server to connect to the osmo API server
    ##
    nextjsSslEnabled: false

    ## Container port for the UI service
    ##
    containerPort: 8000

    ## Kubernetes service account name for the pods
    ##
    serviceAccountName: osmo

    ## Maximum HTTP header size in KB for Node.js server
    ## Prevents 431 "Request Header Fields Too Large" errors
    ## Should match sidecars.envoy.maxHeadersSizeKb
    ##
    maxHttpHeaderSizeKb: 128

    ## Command override for the container
    ## Leave empty to use the default command from the image
    ##
    command: []
    # - "/bin/sh"
    # - "-c"

    ## Arguments for the container
    ## Leave empty to use the default args from the image
    ##
    args: []
    # - "npm start"

    ## Additional labels for pods
    ##
    podLabels: {}
    # environment: production
    # team: osmo

    ## Documentation base URL
    ##
    docsBaseUrl: "https://nvidia.github.io/OSMO/main/user_guide/"

    ## CLI Installation Script URL
    ##
    cliInstallScriptUrl: "https://raw.githubusercontent.com/NVIDIA/OSMO/refs/heads/main/install.sh"

    ## Horizontal Pod Autoscaler (HPA) configuration
    ##
    scaling:
      ## Enable automatic scaling based on CPU usage
      ##
      enabled: false

      ## Minimum number of replicas when scaling is enabled
      ##
      minReplicas: 1

      ## Maximum number of replicas when scaling is enabled
      ##
      maxReplicas: 3

      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaTarget: 85

    ## Kubernetes service configuration
    ##
    service:
      ## Service type (ClusterIP, NodePort, LoadBalancer)
      ## Leave empty to use default behavior
      ##
      type: ""

      ## Service port
      ##
      port: 80

      ## Service port name
      ##
      portName: http

      ## Service protocol
      ##
      protocol: TCP

      ## Additional labels for the service
      ##
      labels: {}
      # version: v1.0.0
      # component: frontend

      ## Additional annotations for the service
      ##
      annotations: {}
      # service.beta.kubernetes.io/aws-load-balancer-type: nlb
      # cloud.google.com/neg: '{"ingress": true}'

      ## Additional service ports
      ##
      extraPorts: []
      # - name: metrics
      #   port: 9090
      #   targetPort: 9090
      #   protocol: TCP

      ## Additional selector labels for the service
      ##
      selector: {}
      # version: v1.0.0

    ## Ingress configuration for external access to the UI service
    ##
    ingress:
      ## Enable ingress for the UI service
      ##
      enabled: true

      ## URL path prefix for all ingress rules
      ##
      prefix: /

      ## Ingress controller class to use for routing traffic
      ##
      ingressClass: nginx

      ## AWS Application Load Balancer (ALB) specific annotations
      ##
      albAnnotations:
        ## Enable ALB-specific annotations in the ingress
        ##
        enabled: false

        ## ARN of the SSL certificate for HTTPS traffic
        ##
        sslCertArn: arn:aws:acm:us-west-2:XXXXXXXXX:certificate/YYYYYYYY

      ## Enable SSL/TLS encryption for the ingress
      ##
      sslEnabled: true

      ## Name of the Kubernetes secret containing SSL/TLS certificates
      ##
      sslSecret: osmo-tls

      ## Additional custom annotations for the ingress resource
      ##
      annotations: {}
      # nginx.ingress.kubernetes.io/proxy-body-size: "100m"
      # nginx.ingress.kubernetes.io/rate-limit-requests-per-second: "10"

    ## Node selector constraints for UI pod scheduling
    ## Leave empty to allow scheduling on any node
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: compute

    ## Topology spread constraints to distribute pods across nodes/zones
    ##
    topologySpreadConstraints:
    ## Spread pods across different hostnames (nodes)
    ##
    - topologyKey: kubernetes.io/hostname
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway
    ## Spread pods across different availability zones
    ##
    - topologyKey: topology.kubernetes.io/zone
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway

    ## Host aliases for custom DNS resolution within the UI pods
    ## Leave empty if no custom host aliases are needed
    ##
    hostAliases: []
    # - ip: "192.168.1.100"
    #   hostnames:
    #   - "example.local"
    #   - "test.example.local"

    ## Tolerations for pod scheduling on tainted nodes
    ## Leave empty to use default tolerations
    ##
    tolerations: []
    # - key: "node-type"
    #   operator: "Equal"
    #   value: "gpu"
    #   effect: "NoSchedule"

    ## Resource limits and requests for the UI container
    ##
    resources: {}
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
    # requests:
    #   cpu: 250m
    #   memory: 256Mi

    ## Additional container ports
    ##
    extraPorts: []
    # - name: metrics
    #   containerPort: 9090
    #   protocol: TCP

    ## Extra environment variables for the UI container
    ## Supports both value and valueFrom
    ##
    extraEnvs: []
    # - name: NEXT_PUBLIC_OSMO_SSL_ENABLED
    #   value: "false"
    # - name: NEXT_PUBLIC_USE_MOCK_DATA
    #   value: "true"


    ## Environment variables from ConfigMaps and Secrets
    ##
    envFrom: []
    # - configMapRef:
    #     name: ui-config
    # - secretRef:
    #     name: ui-secrets

    ## Extra volume mounts for the UI container
    ##
    extraVolumeMounts: []
    # - name: config-volume
    #   mountPath: /app/config
    #   readOnly: true
    # - name: cache-volume
    #   mountPath: /app/cache

    ## Extra volumes for the pod
    ##
    extraVolumes: []
    # - name: config-volume
    #   configMap:
    #     name: ui-config
    # - name: cache-volume
    #   emptyDir: {}
    # - name: shared-data
    #   persistentVolumeClaim:
    #     claimName: shared-data-pvc

    ## Liveness probe configuration
    ## Leave empty to use the default hardcoded probe
    ##
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      failureThreshold: 2
      periodSeconds: 5
      timeoutSeconds: 3

    ## Startup probe configuration
    ## Leave empty to use the default hardcoded probe
    ##
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      failureThreshold: 6
      periodSeconds: 5
      timeoutSeconds: 3
      initialDelaySeconds: 5

    ## Readiness probe configuration
    ## Leave empty to use the default hardcoded probe
    ##
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      failureThreshold: 2
      timeoutSeconds: 3
      periodSeconds: 5


  ## Redis cache service configuration
  ##
  redis:
    ## Kubernetes service name for Redis (leave empty to use in-memory session store)
    ##
    serviceName: ""

    ## Redis service port
    ##
    port: 6379

    ## Redis database number to use (0-15)
    ##
    dbNumber: 0

    ## Enable TLS encryption for Redis connections
    ##
    tlsEnabled: false

## Configuration for sidecar containers
##
sidecars:
  ## Envoy proxy sidecar configuration
  ##
  envoy:
    ## Enable Envoy proxy sidecar container
    ##
    enabled: true

    ## The maximum size of all http headers in kb
    ##
    maxHeadersSizeKb: 128

    ## Allow accessing certain paths from inside the cluster without auth
    ##
    inClusterPaths:
      enabled: false
      port: 8081
      paths: []

    livenessProbe:
      httpGet:
        path: /ready
        port: 9901
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3

    readinessProbe:
      httpGet:
        path: /ready
        port: 9901
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3

    startupProbe:
      httpGet:
        path: /ready
        port: 9901
      initialDelaySeconds: 15
      periodSeconds: 5
      timeoutSeconds: 3

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 1001

    ## If we go over this number of concurrent requests, throw an error
    ## If its empty then do nothing
    ##
    maxRequests: null

    ## Paths that skip authentication
    ##
    skipAuthPaths: []

    ## Container image configuration for Envoy and its dependencies
    ##
    images:
      ## Init container image for setup tasks
      ##
      init: busybox

      ## Envoy proxy container image
      ##
      envoy: "envoyproxy/envoy:v1.29.0"

      ## Image pull policy for all Envoy-related containers
      ##
      pullPolicy: IfNotPresent

    ## Resource limits and requests for Envoy containers
    ##
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        memory: "128Mi"


    ## Enable JWT authentication
    ##
    jwtEnable: true

    ## IDP (Identity Provider) configuration for JWT JWKS fetching
    ##
    idp:
      ## Hostname for the identity provider (e.g., login.microsoftonline.com)
      ##
      host: ""

    ## Route configuration for Envoy proxy
    ##
    routes:
    ## Default route matching all paths
    ##
    - match:
        prefix: "/"
      route:
        cluster: service

    ## Port that Envoy listens on
    ##
    listenerPort: 8080

    ## Service configuration for Envoy proxy
    ##
    service:
      ## Port on which the service runs
      ##
      port: 8000

      ## Hostname for the Envoy service
      ##
      hostname: ""

      ## Service address for upstream cluster
      ##
      address: 127.0.0.1

    ## SSL configuration
    ##
    ssl:
      enabled: false
      cert:
        secretName: envoy-ssl-cert
        secretKey: cert
      privateKey:
        secretName: envoy-ssl-cert
        secretKey: privateKey

    ## Volume mounts for the Envoy container
    ##
    volumeMounts:
    ## Mount logs volume for log collection
    ##
    - name: logs
      mountPath: /logs

    ## JWT (JSON Web Token) authentication configuration
    ##
    jwt:
      ## HTTP header name where the authenticated user will be set
      ##
      user_header: x-osmo-user

      ## List of JWT token providers for authentication
      ##
      providers:
      ## Primary JWT provider configuration
      ##
      - issuer: ""
        audience: ""
        jwks_uri: ""
        user_claim: unique_name
        cluster: idp
      ## Secondary JWT provider configuration
      ##
      - issuer: ""
        audience: ""
        jwks_uri: ""
        user_claim: preferred_username
        cluster: idp

  ## OAuth2 Proxy sidecar configuration
  ##
  oauth2Proxy:
    ## Enable OAuth2 Proxy sidecar container
    ##
    enabled: true

    ## OAuth2 Proxy container image
    ##
    image: "quay.io/oauth2-proxy/oauth2-proxy:v7.14.2"

    ## Image pull policy
    ##
    imagePullPolicy: IfNotPresent

    ## HTTP port for OAuth2 Proxy
    ##
    httpPort: 4180

    ## Metrics port for OAuth2 Proxy
    ##
    metricsPort: 44180

    ## OIDC provider type
    ##
    provider: oidc

    ## OIDC issuer URL
    ##
    oidcIssuerUrl: ""

    ## OAuth2 client ID
    ##
    clientId: ""

    ## Cookie name for session management
    ##
    cookieName: _osmo_session

    ## Whether to set the secure flag on cookies
    ##
    cookieSecure: true

    ## Cookie domain (leave empty for default)
    ##
    cookieDomain: ""

    ## Cookie expiration duration
    ##
    cookieExpire: 168h

    ## Cookie refresh interval
    ##
    cookieRefresh: 1h

    ## OAuth2 scopes to request
    ##
    scope: "openid email profile"

    ## Pass the access token to upstream (disabled to reduce cookie size)
    ##
    passAccessToken: false

    ## Use Redis (services.redis) as the session store instead of in-memory
    ##
    redisSessionStore: false

    ## Use Kubernetes secrets for credentials
    ##
    useKubernetesSecrets: false

    ## Kubernetes secret configuration (when useKubernetesSecrets is true)
    ##
    secretName: oauth2-proxy-secrets
    clientSecretKey: client_secret
    cookieSecretKey: cookie_secret

    ## Secret file paths (when using vault or other secret managers)
    ##
    secretPaths:
      clientSecret: /etc/oauth2-proxy/client-secret
      cookieSecret: /etc/oauth2-proxy/cookie-secret

    ## OIDC end session endpoint URL for federated logout.
    ## When set, Envoy exposes /signout which redirects the browser to
    ## /oauth2/sign_out?rd=<oidcEndSessionUrl>, clearing both the local session cookie
    ## and the IdP's SSO session. Requires --whitelist-domain=<idp-domain> in extraArgs.
    ## Example (Azure AD): https://login.microsoftonline.com/<tenant>/oauth2/v2.0/logout
    ## Example (Keycloak): https://<host>/realms/<realm>/protocol/openid-connect/logout
    ##
    oidcEndSessionUrl: ""

    ## Additional arguments passed to oauth2-proxy
    ##
    extraArgs: []

    ## Additional volume mounts
    ##
    extraVolumeMounts: []

    ## Security context for OAuth2 Proxy container
    ##
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 1001

    ## Resource limits and requests
    ##
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        memory: "128Mi"

## Additional ConfigMaps to create
##
extraConfigMaps: []
# - name: custom-config
#   data:
#     config.yaml: |
#       key: value

## Additional containers to include in the pod
##
extraContainers: []
# - name: custom-container
#   image: custom:latest
#   ports:
#   - containerPort: 8080

## Additional pod annotations
##
extraPodAnnotations: {}
# custom-annotations: custom-value
