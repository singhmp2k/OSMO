## Global configuration values shared across all Osmo router service components
##
global:
  ## Base location for Osmo Docker images in the registry
  ##
  osmoImageLocation: nvcr.io/nvidia/osmo

  ## Docker image tag for Osmo router service
  ##
  osmoImageTag: latest

  ## Name of the Kubernetes secret containing Docker registry credentials
  ##
  imagePullSecret: null

  ## Node selector constraints for pod scheduling
  ##
  nodeSelector: {}
    # Add node selectors here as needed
    # kubernetes.io/arch: amd64
    # node-type: cpu
    # zone: us-west-2a

  ## Logging configuration for all Osmo services
  ##
  logs:
    ## Enable centralized logging collection and log volume mounting
    ##
    enabled: true

    ## Application log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
    ##
    logLevel: DEBUG

    ## Kubernetes system log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
    ##
    k8sLogLevel: WARNING

## pgroll schema version for search_path.
## Convention: public_v{MAJOR}_{MINOR}_{PATCH} (e.g., public_v6_2_0)
## will use default schema if not set
##
targetSchema: ""

## Service account configuration for router service
##
serviceAccount:
  ## Create the chart-managed ServiceAccount. Set to false to re-use
  ## an existing ServiceAccount that already has workload identity bindings.
  ##
  create: true

  ## ServiceAccount name override. When empty, uses 'router'.
  ##
  name: ""

  ## Extra ServiceAccount annotations such as
  ## `azure.workload.identity/client-id` for AKS workload identity.
  ##
  annotations: {}

## Configuration for individual Osmo services
##
services:
  ## Configuration file service settings
  ##
  configFile:
    ## Enable external configuration file loading
    ##
    enabled: false

    ## Path to the configuration file (used when enabled is true)
    ##
    path: /opt/osmo/config.yaml

  ## Router service configuration
  ##
  service:
    ## Horizontal Pod Autoscaler (HPA) configuration
    ##
    scaling:
      ## Minimum number of replicas when scaling is enabled
      ##
      minReplicas: 3

      ## Maximum number of replicas when scaling is enabled
      ##
      maxReplicas: 5

      ## Target memory utilization percentage for HPA scaling
      ##
      memoryTarget: 80

      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

    ## Docker image name for the router service (without registry or tag)
    ##
    imageName: router

    ## Kubernetes image pull policy for the router service
    ## Options: Always, IfNotPresent, Never
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for the router service
    ##
    serviceName: osmo-router

    ## Init containers for router service
    ##
    initContainers: []

    ## Hostname on which the ingress is served
    ## Leave empty to use the default cluster hostname
    ##
    hostname: ""

    ## Enable webserver functionality for wildcard subdomain support
    ##
    webserverEnabled: false

    ## Additional command line arguments to pass to the router service
    ##
    extraArgs: []
    # - "--debug"
    # - "--config=/path/to/config"

    ## Kubernetes service account name for the router service
    ##
    serviceAccountName: router

    ## Host aliases for custom DNS resolution within the router pods
    ##
    hostAliases: []
    # - ip: "192.168.1.100"
    #   hostnames:
    #   - "example.local"


    ## Ingress configuration for external access to the router service
    ##
    ingress:
      ## Enable ingress for external access
      ##
      enabled: true

      ## URL path prefix for all ingress rules
      ##
      prefix: /

      ## Ingress controller class to use for routing traffic
      ##
      ingressClass: nginx

      ## AWS Application Load Balancer (ALB) specific annotations
      ##
      albAnnotations:
        ## Enable ALB-specific annotations in the ingress
        ##
        enabled: false

        ## ARN of the SSL certificate for HTTPS traffic
        ##
        sslCertArn: arn:aws:acm:us-west-2:XXXXXXXXX:certificate/YYYYYYYY

      ## Enable SSL/TLS encryption for the ingress
      ##
      sslEnabled: true

      ## Name of the Kubernetes secret containing SSL/TLS certificates
      ##
      sslSecret: osmo-tls

      ## Additional custom annotations for the ingress resource
      ##
      annotations: {}
      # nginx.ingress.kubernetes.io/proxy-body-size: "100m"
      # alb.ingress.kubernetes.io/target-type: ip

    ## Node selector constraints for router pod scheduling
    ## Leave empty to allow scheduling on any node
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: cpu

    ## Tolerations for pod scheduling on tainted nodes
    ## Leave empty to use default tolerations
    ##
    tolerations: []
    # - key: "node-type"
    #   operator: "Equal"
    #   value: "cpu"
    #   effect: "NoSchedule"

    ## Topology spread constraints to distribute pods across nodes/zones
    ##
    topologySpreadConstraints:
    ## Spread pods across different availability zones
    ##
    - topologyKey: topology.kubernetes.io/zone
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway

    ## Resource limits and requests for the router container
    ##
    resources: {}
    # limits:
    #   cpu: 1000m
    #   memory: 1Gi
    # requests:
    #   cpu: 500m
    #   memory: 512Mi

    ## Health check probes for the router container
    ##
    livenessProbe:
      httpGet:
        port: 8000
        path: /api/router/version
      failureThreshold: 2
      periodSeconds: 5
      timeoutSeconds: 30

    startupProbe:
      httpGet:
        port: 8000
        path: /api/router/version
      failureThreshold: 6
      periodSeconds: 5
      timeoutSeconds: 3
      initialDelaySeconds: 30

    readinessProbe:
      httpGet:
        port: 8000
        path: /api/router/version
      periodSeconds: 5
      failureThreshold: 2
      timeoutSeconds: 30

  ## PostgreSQL database configuration
  ##
  postgres:
    ## PostgreSQL service name for connection
    ##
    serviceName: postgres

    ## PostgreSQL service port
    ##
    port: 5432

    ## PostgreSQL database name to connect to
    ##
    db: osmo

    ## PostgreSQL username for authentication
    ##
    user: postgres

    ## PostgreSQL password for authentication (optional, can be provided via kubernetes secret)
    ##
    password: ""

  ## Redis cache service configuration
  ##
  redis:
    ## Kubernetes service name for Redis (leave empty to use in-memory session store)
    ##
    serviceName: ""

    ## Redis service port
    ##
    port: 6379

    ## Redis database number to use (0-15)
    ##
    dbNumber: 0

    ## Enable TLS encryption for Redis connections
    ##
    tlsEnabled: false

## Configuration for sidecar containers
##
sidecars:
  ## Envoy proxy sidecar configuration
  ##
  envoy:
    ## Maximum number of concurrent requests Envoy will handle for the router service
    ##
    maxRequests: 1000

    ## Enable Envoy proxy sidecar container
    ##
    enabled: true

    ## Paths that should skip authentication
    ##
    skipAuthPaths:
      - /api/router/version

    ## Envoy proxy container image
    ##
    image: "envoyproxy/envoy:v1.29.0"

    ## Image pull policy for Envoy container
    ##
    imagePullPolicy: IfNotPresent

    ## Port on which Envoy proxy listens for incoming requests
    ##
    listenerPort: 8080

    ## Maximum size of all http headers in kb
    ##
    maxHeadersSizeKb: 128

    ## Log level for Envoy proxy
    ##
    logLevel: info

    ## Security context for Envoy containers
    ##
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 1001

    ## Resource limits and requests for Envoy container
    ##
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        memory: "128Mi"

    ## Service configuration for Envoy proxy
    ##
    service:
      ## Port on which the upstream service listens
      ##
      port: 8000

      ## Hostname for the Envoy service
      ##
      hostname: ""

      ## Local address for service communication
      ##
      address: 127.0.0.1

    ## Route configuration for Envoy proxy
    ##
    routes:
    - match:
        prefix: "/"
      route:
        cluster: service
        timeout: 0s


    ## IDP (Identity Provider) configuration for JWT JWKS fetching
    ##
    idp:
      ## Hostname for the identity provider (e.g., login.microsoftonline.com)
      ##
      host: ""

    ## JWT (JSON Web Token) authentication configuration
    ##
    jwt:
      ## Enable JWT authentication
      ##
      enabled: true

      ## HTTP header name where the authenticated user will be set
      ##
      user_header: x-osmo-user

      ## List of JWT token providers for authentication
      ##
      providers: []

    ## Osmo authentication service configuration
    ##
    osmoauth:
      ## Enable connection to Osmo authentication service
      ##
      enabled: true

      ## Port for Osmo authentication service
      ##
      port: 80

      ## Hostname for Osmo authentication service
      ##
      hostname: ""

      ## Address for Osmo authentication service
      ##
      address: osmo-service

    ## Additional volume mounts for the Envoy container
    ##
    extraVolumeMounts: []

    ## Health check probes for Envoy container
    ##
    livenessProbe:
      httpGet:
        path: /ready
        port: 9901
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3

    readinessProbe:
      httpGet:
        path: /ready
        port: 9901
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3

    startupProbe:
      httpGet:
        path: /ready
        port: 9901
      initialDelaySeconds: 15
      periodSeconds: 5
      timeoutSeconds: 3


  ## OAuth2 Proxy sidecar configuration
  ##
  oauth2Proxy:
    ## Enable OAuth2 Proxy sidecar container
    ##
    enabled: true

    ## OAuth2 Proxy container image
    ##
    image: "quay.io/oauth2-proxy/oauth2-proxy:v7.14.2"

    ## Image pull policy
    ##
    imagePullPolicy: IfNotPresent

    ## HTTP port for OAuth2 Proxy
    ##
    httpPort: 4180

    ## Metrics port for OAuth2 Proxy
    ##
    metricsPort: 44180

    ## OIDC provider type
    ##
    provider: oidc

    ## OIDC issuer URL
    ##
    oidcIssuerUrl: ""

    ## OAuth2 client ID
    ##
    clientId: ""

    ## Cookie name for session management
    ##
    cookieName: _osmo_session

    ## Whether to set the secure flag on cookies
    ##
    cookieSecure: true

    ## Cookie domain (leave empty for default)
    ##
    cookieDomain: ""

    ## Cookie expiration duration
    ##
    cookieExpire: 168h

    ## Cookie refresh interval
    ##
    cookieRefresh: 1h

    ## OAuth2 scopes to request
    ##
    scope: "openid email profile"

    ## Pass the access token to upstream (disabled to reduce cookie size)
    ##
    passAccessToken: false

    ## Use Redis (services.redis) as the session store instead of in-memory
    ##
    redisSessionStore: false

    ## Use Kubernetes secrets for credentials
    ##
    useKubernetesSecrets: false

    ## Kubernetes secret configuration (when useKubernetesSecrets is true)
    ##
    secretName: oauth2-proxy-secrets
    clientSecretKey: client_secret
    cookieSecretKey: cookie_secret

    ## Secret file paths (when using vault or other secret managers)
    ##
    secretPaths:
      clientSecret: /etc/oauth2-proxy/client-secret
      cookieSecret: /etc/oauth2-proxy/cookie-secret

    ## Additional arguments passed to oauth2-proxy
    ##
    extraArgs: []

    ## Additional volume mounts
    ##
    extraVolumeMounts: []

    ## Security context for OAuth2 Proxy container
    ##
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 1001

    ## Resource limits and requests
    ##
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        memory: "128Mi"

  ## Authorization sidecar configuration (role-based access control)
  ## Implements Envoy External Authorization API for PostgreSQL-backed RBAC
  ##
  authz:
    ## Enable authorization sidecar
    ##
    enabled: true

    ## Authorization sidecar Docker image
    ##
    imageName: "authz-sidecar"

    ## Image pull policy for authorization sidecar
    ##
    imagePullPolicy: Always

    ## gRPC port for authorization service
    ##
    grpcPort: 50052

    ## Extra environment variables for the authz sidecar container
    ##
    extraEnv: []

    ## PostgreSQL connection pool configuration
    ## Note: Host, port, database, user, and password are inherited from services.postgres
    ##
    postgres:
      ## PostgreSQL SSL mode (disable, prefer, require, verify-full)
      ##
      sslMode: prefer

      ## Maximum number of connections in the pool
      ##
      maxConns: 10

      ## Minimum number of connections in the pool
      ##
      minConns: 2

      ## Maximum lifetime of a connection in minutes
      ##
      maxConnLifetimeMin: 5

    ## Role cache configuration
    ##
    cache:
      ## Cache time-to-live (how long to cache role policies in seconds)
      ##
      ttl: 300

      ## Maximum number of role combinations to cache
      ##
      maxSize: 1000

    ## Resource limits and requests for authorization sidecar
    ##
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    ## Liveness probe configuration
    ##
    livenessProbe:
      grpc:
        port: 50052
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

    ## Readiness probe configuration
    ##
    readinessProbe:
      grpc:
        port: 50052
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 2

    ## Security context for authorization sidecar
    ##
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 10001

